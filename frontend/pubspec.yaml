name: quick_chat
description: "Quick Chat — Real-time WhatsApp-like messaging app"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.3
  http: ^1.2.1

  # WebSocket / Real-time
  socket_io_client: ^2.0.3+1

  # Secure storage (JWT)
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.2

  # Image picking & caching
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Date formatting
  intl: ^0.19.0

  # UI helpers
  flutter_spinkit: ^5.2.1
  fluttertoast: ^8.2.5
  google_fonts: ^6.2.1
  timeago: ^3.6.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
